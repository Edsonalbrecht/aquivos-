[build]
  base    = "frontend"
  publish = "dist"
  command = "npm run build"

[build.environment]
  NODE_VERSION = "20"
  # Defina esta variável no painel do Netlify: Site > Environment Variables
  # VITE_API_URL = "https://seu-backend.up.railway.app"

[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
