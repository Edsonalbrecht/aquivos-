services:
  - type: web
    name: candeias-nexus-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: node src/index.js
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        sync: false
      - key: FRONTEND_URL
        value: https://candeiasnexuscrm.netlify.app
      - key: DB_PATH
        value: ./crm.db
      - key: GEMINI_API_KEY
        sync: false
