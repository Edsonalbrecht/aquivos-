server {
    listen 80;
    server_name seu-dominio.com;

    # Redirecionamento gerenciado pelo Certbot ou manual
    if ($host = seu-dominio.com) {
        return 301 https://$host$request_uri;
    }
    return 404;
}

server {
    listen 443 ssl; # managed by Certbot
    server_name seu-dominio.com;

    ssl_certificate /etc/letsencrypt/live/seu-dominio.com/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/seu-dominio.com/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

    # 1. FRONTEND: Servir arquivos estáticos do React
    location / {
        root /var/www/candeias-nexus-crm/frontend/dist;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # 2. BACKEND API: Proxy para o Node.js
    location /api/ {
        proxy_pass http://localhost:3001/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Timeout para requisições longas (como uploads)
        proxy_read_timeout 300;
        proxy_connect_timeout 300;
    }

    # 3. SOCKET.IO: Configuração específica para WebSockets
    location /socket.io/ {
        proxy_pass http://localhost:3001/socket.io/;
        proxy_http_version 1.1;
        
        # Cabeçalhos cruciais para o upgrade de protocolo
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Evita que o Nginx feche a conexão ociosa muito rápido
        proxy_read_timeout 86400;
    }

    # 4. UPLOADS: Servir arquivos de mídia diretamente pelo Nginx (mais rápido)
    location /uploads/ {
        alias /var/www/candeias-nexus-crm/backend/uploads/;
        expires 30d;
        add_header Cache-Control "public, no-transform";
        
        # Bloqueia execução de scripts na pasta de uploads por segurança
        location ~* \.(php|pl|py|jsp|asp|sh|cgi)$ {
            deny all;
        }
    }
}